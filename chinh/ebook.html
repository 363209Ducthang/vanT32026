<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sách 3D có Navbar</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    * { box-sizing: border-box; }

    :root {
      --book-w: min(96vw, 2200px);
      --book-h: min(84vh, 1320px);
      --page-gap: clamp(12px, 1vw, 24px);

      --paper: #fffdf7;
      --paper-2: #f4ecde;
      --ink: #1d2734;
      --muted: #556274;

      --cover-1: #1659d6;
      --cover-2: #0a327c;
      --cover-3: #06214d;

      --shadow: 0 40px 90px rgba(0,0,0,.35);
      --turn-time: 1.1s;
      --nav-h: 78px;
    }

    html, body {
      height: 100%;
    }

    body {
  margin: 0;
  min-height: 100vh;
  overflow-x: hidden;
  overflow-y: auto;
  font-family: Inter, Arial, Helvetica, sans-serif;
  color: var(--ink);
  background:
    radial-gradient(circle at 20% 8%, rgba(255,255,255,.55), transparent 24%),
    radial-gradient(circle at 85% 12%, rgba(255,255,255,.35), transparent 18%),
    linear-gradient(135deg, #d9ebff 0%, #eef6ff 28%, #f9fbff 58%, #ddf0ff 100%);
}

    /* ===== NAVBAR ===== */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 9999;
      background: rgba(255,255,255,.88) !important;
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(15,23,42,.08);
      box-shadow: 0 10px 30px rgba(15,23,42,.08);
      min-height: var(--nav-h);
    }

    .navbar-brand img {
      height: 46px;
      width: auto;
      object-fit: contain;
      display: block;
      border-radius: 10px;
    }

    .btn-nav {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      color: #0f172a;
      background: #ffffff;
      border: 1px solid rgba(15,23,42,.08);
      box-shadow: 0 8px 18px rgba(15,23,42,.06);
      transition: .2s ease;
    }

    .btn-nav:hover {
      transform: translateY(-1px);
      color: #1d4ed8;
      border-color: rgba(37,99,235,.2);
    }

    .nav-buttons {
      margin-left: auto;
    }

    /* ===== APP ===== */
    .app {
      min-height: 100%;
      display: grid;
      grid-template-rows: 1fr auto;
      padding: calc(var(--nav-h) + 18px) clamp(10px, 2vw, 26px) 12px;
      gap: 10px;
    }

    .stage {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 4600px;
      overflow: hidden;
    }

    .floor-shadow {
      position: absolute;
      width: calc(var(--book-w) * 0.92);
      height: clamp(50px, 5vw, 90px);
      bottom: 2.5%;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(0,0,0,.28), transparent 72%);
      filter: blur(18px);
      transform: translateY(16px);
      pointer-events: none;
    }

    .book {
      position: relative;
      width: var(--book-w);
      height: var(--book-h);
      transform-style: preserve-3d;
      transform: rotateX(10deg);
      user-select: none;
      cursor: pointer;
    }

    .book-base {
      position: absolute;
      inset: 0;
      border-radius: 22px;
      background: linear-gradient(180deg, #cbc5bc 0%, #b4ada4 35%, #d8d1c9 100%);
      transform: translateZ(-36px);
      box-shadow: var(--shadow);
    }

    .page-stack-left,
    .page-stack-right {
      position: absolute;
      top: clamp(14px, 1vw, 24px);
      width: calc(50% - var(--page-gap));
      height: calc(100% - clamp(28px, 2vw, 48px));
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(180deg, #fcf8ef 0%, #efe7d7 45%, #faf5ea 100%);
      box-shadow:
        inset 0 0 0 1px rgba(0,0,0,.07),
        inset 0 0 20px rgba(0,0,0,.07);
      z-index: 1;
    }

    .page-stack-left { left: var(--page-gap); }
    .page-stack-right { right: var(--page-gap); }

    .page-stack-left::before,
    .page-stack-right::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        180deg,
        rgba(0,0,0,.018) 0 2px,
        rgba(255,255,255,.38) 2px 4px
      );
      opacity: .78;
    }

    .spine {
      position: absolute;
      left: 50%;
      top: 1.2%;
      width: clamp(18px, 1vw, 26px);
      height: 97%;
      transform: translateX(-50%) translateZ(4px);
      border-radius: 999px;
      background: linear-gradient(
        180deg,
        rgba(255,255,255,.65) 0%,
        rgba(255,255,255,.18) 12%,
        rgba(0,0,0,.18) 48%,
        rgba(255,255,255,.28) 80%,
        rgba(255,255,255,.55) 100%
      );
      box-shadow:
        0 0 26px rgba(255,255,255,.28),
        inset 0 0 10px rgba(0,0,0,.2);
      z-index: 6;
      pointer-events: none;
    }

    .gutter-shadow {
      position: absolute;
      left: 50%;
      top: clamp(14px, 1vw, 24px);
      width: clamp(60px, 6vw, 100px);
      height: calc(100% - clamp(28px, 2vw, 48px));
      transform: translateX(-50%);
      background: radial-gradient(circle at center, rgba(0,0,0,.16), transparent 68%);
      filter: blur(12px);
      z-index: 4;
      pointer-events: none;
    }

    .sheet {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      pointer-events: none;
    }

    .page {
      position: absolute;
      top: clamp(14px, 1vw, 24px);
      width: calc(50% - var(--page-gap));
      height: calc(100% - clamp(28px, 2vw, 48px));
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(180deg, var(--paper) 0%, #fbf7ee 55%, #f8f1e4 100%);
      border: 1px solid rgba(0,0,0,.07);
      box-shadow:
        0 10px 26px rgba(0,0,0,.12),
        inset 0 0 40px rgba(255,255,255,.4);
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.22), transparent 20%),
        repeating-linear-gradient(
          180deg,
          transparent 0 30px,
          rgba(0,0,0,.015) 30px 31px
        );
      pointer-events: none;
      z-index: 0;
    }

    .page::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .static-left {
      left: var(--page-gap);
      transform-origin: right center;
      z-index: 5;
    }

    .front {
      right: var(--page-gap);
      transform-origin: left center;
      transition: transform var(--turn-time) cubic-bezier(.2,.72,.18,1);
      z-index: 3;
    }

    .back {
      left: var(--page-gap);
      transform: rotateY(180deg);
      transform-origin: right center;
      transition: transform var(--turn-time) cubic-bezier(.2,.72,.18,1);
      z-index: 2;
    }

    .front::after {
      background: linear-gradient(
        90deg,
        rgba(0,0,0,.18) 0%,
        transparent 24%,
        transparent 76%,
        rgba(0,0,0,.06) 100%
      );
      opacity: .36;
    }

    .back::after,
    .static-left::after {
      background: linear-gradient(
        90deg,
        rgba(0,0,0,.05) 0%,
        transparent 22%,
        transparent 80%,
        rgba(0,0,0,.18) 100%
      );
      opacity: .35;
    }

    .sheet.flipped .front {
      transform: rotateY(-180deg);
    }

    .sheet.flipped .back {
      transform: rotateY(0deg);
    }

    .page-content {
      position: relative;
      z-index: 1;
      height: 100%;
      padding: clamp(18px, 1.5vw, 34px) clamp(18px, 1.6vw, 36px) clamp(14px, 1vw, 24px);
      display: flex;
      flex-direction: column;
      gap: clamp(10px, 1vw, 16px);
      overflow: auto;
    }

    .page-content::-webkit-scrollbar {
      width: 6px;
    }

    .page-content::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,.15);
      border-radius: 999px;
    }

    .cover-layout {
      height: 100%;
      border-radius: inherit;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 14px;
      color: #fff;
      background:
        radial-gradient(circle at 18% 14%, rgba(255,255,255,.18), transparent 26%),
        radial-gradient(circle at 82% 18%, rgba(255,255,255,.12), transparent 16%),
        linear-gradient(145deg, var(--cover-1) 0%, var(--cover-2) 52%, var(--cover-3) 100%);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.08),
        inset 0 0 40px rgba(255,255,255,.08);
      position: relative;
      overflow: hidden;
    }

    .cover-layout::after {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.12);
      pointer-events: none;
    }

    .cover-emblem {
      width: clamp(90px, 8vw, 150px);
      height: clamp(90px, 8vw, 150px);
      display: grid;
      place-items: center;
      border-radius: 28px;
      font-size: clamp(40px, 3vw, 70px);
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: inset 0 0 30px rgba(255,255,255,.08);
      backdrop-filter: blur(8px);
    }

    .cover-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 18px;
      border-radius: 999px;
      font-size: clamp(12px, .85vw, 16px);
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: #fff8d5;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.08);
    }

    .cover-title {
      margin: 0;
      max-width: 90%;
      font-size: clamp(30px, 4.2vw, 86px);
      line-height: 1.03;
      font-weight: 900;
    }

    .cover-sub {
      margin: 0;
      max-width: min(80%, 680px);
      font-size: clamp(14px, 1.25vw, 24px);
      line-height: 1.75;
      opacity: .96;
    }

    .chapter-kicker {
      font-size: clamp(11px, .78vw, 14px);
      font-weight: 800;
      letter-spacing: .14em;
      color: #8a6a15;
      text-transform: uppercase;
    }

    .chapter-title {
      margin: 0;
      font-size: clamp(22px, 1.8vw, 40px);
      line-height: 1.2;
    }

    .lead {
      margin: 0;
      font-size: clamp(14px, 1.08vw, 20px);
      line-height: 1.8;
      color: var(--muted);
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: clamp(10px, .8vw, 16px);
    }

    .mini-card {
      padding: clamp(12px, 1vw, 18px);
      border-radius: 16px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      border: 1px solid rgba(15,23,42,.08);
      box-shadow: 0 8px 18px rgba(15,23,42,.05);
    }

    .mini-card strong {
      display: block;
      margin-bottom: 6px;
      font-size: clamp(14px, 1vw, 18px);
    }

    .mini-card span,
    ul li,
    ol li {
      font-size: clamp(13px, .95vw, 18px);
      line-height: 1.75;
      color: var(--muted);
    }

    ul, ol {
      margin: 0;
      padding-left: 22px;
      display: grid;
      gap: 8px;
    }

    .highlight {
      padding: clamp(14px, 1vw, 18px) clamp(14px, 1.1vw, 20px);
      border-radius: 16px;
      background: linear-gradient(180deg, #fff4cf 0%, #fff9e7 100%);
      border-left: 5px solid #f2b628;
      color: #725300;
      font-size: clamp(13px, .95vw, 18px);
      line-height: 1.8;
    }

    .page-footer {
      margin-top: auto;
      padding-top: 10px;
      border-top: 1px dashed rgba(15,23,42,.14);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: clamp(12px, .85vw, 15px);
      color: #778396;
    }

    .page-no {
      font-weight: 800;
      color: #0f172a;
    }

    .controls {
      width: min(760px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 22px;
      background: rgba(255,255,255,.78);
      border: 1px solid rgba(255,255,255,.7);
      box-shadow: 0 16px 40px rgba(15,23,42,.08);
      backdrop-filter: blur(12px);
    }

    .nav-btn-control {
      border: 0;
      min-width: 92px;
      padding: 14px 16px;
      border-radius: 16px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 800;
      transition: transform .18s ease, opacity .18s ease, box-shadow .18s ease;
    }

    .nav-btn-control:hover { transform: translateY(-2px); }
    .nav-btn-control:active { transform: translateY(0); }

    .nav-btn-control.prev {
      background: #ffffff;
      color: #0f172a;
      border: 1px solid rgba(15,23,42,.08);
      box-shadow: 0 8px 18px rgba(15,23,42,.06);
    }

    .nav-btn-control.next {
      color: white;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      box-shadow: 0 12px 24px rgba(37,99,235,.24);
    }

    .nav-btn-control:disabled {
      cursor: not-allowed;
      opacity: .55;
      transform: none;
      box-shadow: none;
    }

    .status {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .status strong {
      font-size: 15px;
    }

    .progress {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: #e6e9f0;
    }

    .progress span {
      display: block;
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #2563eb, #6bb6ff);
      transition: width .35s ease;
    }

    .hint {
      text-align: center;
      font-size: 13px;
      color: #64748b;
      margin-top: 6px;
      margin-bottom: 5%;
    }

    @media (max-width: 1400px) {
      :root {
        --book-w: min(95vw, 1800px);
        --book-h: min(80vh, 1050px);
      }
    }

    @media (max-width: 991px) {
      .nav-buttons {
        margin-top: 12px;
        width: 100%;
        justify-content: flex-start;
        flex-wrap: wrap;
      }
    }

    @media (max-width: 980px) {
      :root {
        --book-w: min(97vw, 1260px);
        --book-h: min(70vh, 820px);
      }

      .book {
        transform: rotateX(6deg);
      }

      .card-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      :root {
        --book-w: 97vw;
        --book-h: min(56vh, 560px);
        --page-gap: 10px;
      }

      .book {
        transform: rotateX(3deg);
      }

      .controls {
        grid-template-columns: 74px 1fr 74px;
        padding: 8px;
        border-radius: 18px;
      }

      .nav-btn-control {
        min-width: 74px;
        padding: 12px 10px;
        font-size: 14px;
      }

      .cover-title {
        font-size: clamp(22px, 6vw, 34px);
      }

      .cover-sub {
        font-size: 13px;
        line-height: 1.6;
      }

      .chapter-title {
        font-size: 18px;
      }

      .lead,
      .mini-card span,
      ul li,
      ol li,
      .highlight {
        font-size: 13px;
      }

      .navbar-brand img {
        height: 38px;
      }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg topbar">
    <div class="container-fluid px-3 px-lg-4">
      <a class="navbar-brand" id="brandLink" href="#">
        <img id="brandLogo" src="" alt="Logo">
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarMain">
        <ul class="navbar-nav me-auto"></ul>

        <div class="nav-buttons d-flex align-items-center gap-2" id="navButtons"></div>
      </div>
    </div>
  </nav>

  <div class="app">
    <div class="stage">
      <div class="floor-shadow"></div>

      <div class="book" id="book">
        <div class="book-base"></div>
        <div class="page-stack-left"></div>
        <div class="page-stack-right"></div>
        <div class="gutter-shadow"></div>
        <div class="spine"></div>
      </div>
    </div>

    <div>
      <div class="controls">
        <button class="nav-btn-control prev" id="prevBtn">◀ Trước</button>

        <div class="status">
          <strong id="pageInfo">Trang 1 / 1</strong>
          <div class="progress"><span id="progressBar"></span></div>
        </div>

        <button class="nav-btn-control next" id="nextBtn">Sau ▶</button>
      </div>

      <div class="hint">Nhấn nửa phải sách để sang trang, nửa trái để quay lại. Điện thoại có thể vuốt trái / phải.</div>
    </div>
  </div>
<br>
<br>
  <script>
    /* =========================================================
       CHỈNH NỘI DUNG Ở ĐÂY
       Đại ca chỉ sửa khối DATA này là đủ
    ========================================================== */

    const DATA = {
      brand: {
        href: "/index.html",
        logo: "/imgalbum/1.jpg"
        // thay dòng trên bằng logo base64 hoặc link ảnh của đại ca
      },

      navLinks: [
        { text: "Lớp 11T3", href: "/hieu/index1.html" },
        { text: "Thành Viên Nhóm", href: "/chinh/thanhvien.html" }
      ],

      pages: [
        {
          type: "cover",
          title: "TIẾNG ANH 8",
          subtitle: "Sách điện tử 3D với hiệu ứng lật trang chân thực như sách thật",
          badge: "EDU BOOK",
          icon: "📘"
        },
        {
          type: "content",
          kicker: "Unit 1",
          title: "Getting Started",
          lead: "Đây là mẫu nội dung. Đại ca chỉ cần thay chữ trong mảng pages là sách tự đổi nội dung.",
          blocks: [
            {
              kind: "cards",
              items: [
                ["Mục tiêu", "Học từ vựng và phản xạ giao tiếp cơ bản."],
                ["Trọng tâm", "Hiện tại đơn, câu hỏi ngắn, chủ đề trường học."]
              ]
            },
            {
              kind: "highlight",
              text: "Muốn thêm trang mới chỉ cần copy 1 object rồi dán thêm vào cuối mảng pages."

          ]
        },
        {
          type: "content",
          kicker: "Từ vựng",
          title: "Vocabulary",
          lead: "Dạng danh sách rất dễ sửa.",
          blocks: [
            {
              kind: "list",
              ordered: false,
              items: [
                "classmate — bạn cùng lớp",
                "subject — môn học",
                "uniform — đồng phục",
                "playground — sân chơi",
                "library — thư viện"
              ]
            }
          ]
        },
        {
          type: "content",
          kicker: "Ngữ pháp",

          blocks: [

            {
              kind: "highlight",
              text: "Đại ca có thể đổi toàn bộ đoạn này thành nội dung bất động sản, bài học, truyện, profile công ty hoặc catalogue."

          ]
        },
        {
          type: "content",

          blocks: [

              ]

          ]
        },
        {
          type: "cover",
          title: "HẾT BÀI",
          subtitle: "Có thể thêm unit mới, mục lục hoặc trang cảm ơn.",
          badge: "FINISH",

        }
      ]
    };

    /* =========================================================
       KHÔNG CẦN SỬA PHÍA DƯỚI
    ========================================================== */

    const brandLink = document.getElementById("brandLink");
    const brandLogo = document.getElementById("brandLogo");
    const navButtons = document.getElementById("navButtons");

    const book = document.getElementById("book");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const pageInfo = document.getElementById("pageInfo");
    const progressBar = document.getElementById("progressBar");

    let currentSpread = 0;
    const totalPages = DATA.pages.length;
    const totalSpreads = Math.ceil(totalPages / 2);

    function escapeHtml(value = "") {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderNavbar() {
      brandLink.href = DATA.brand.href || "#";
      brandLogo.src = DATA.brand.logo || "";

      navButtons.innerHTML = (DATA.navLinks || []).map(link => `
        <a class="btn-nav" href="${escapeHtml(link.href || "#")}">${escapeHtml(link.text || "")}</a>
      `).join("");
    }

    function blockTemplate(block) {
      if (block.kind === "cards") {
        return `
          <div class="card-grid">
            ${block.items.map(([title, text]) => `
              <div class="mini-card">
                <strong>${escapeHtml(title)}</strong>
                <span>${escapeHtml(text)}</span>
              </div>
            `).join("")}
          </div>
        `;
      }

      if (block.kind === "list") {
        const Tag = block.ordered ? "ol" : "ul";
        return `
          <${Tag}>
            ${block.items.map(item => `<li>${escapeHtml(item)}</li>`).join("")}
          </${Tag}>
        `;
      }

      if (block.kind === "paragraph") {
        return `<p class="lead">${escapeHtml(block.text)}</p>`;
      }

      if (block.kind === "highlight") {
        return `<div class="highlight">${escapeHtml(block.text)}</div>`;
      }

      return "";
    }

    function renderPageContent(page, index) {
      const pageNumber = index + 1;

      if (!page) {
        return `
          <div class="page-content">
            <div class="chapter-kicker">Trang trống</div>
            <h3 class="chapter-title">Blank Page</h3>
            <div class="page-footer">
              <span></span>
              <span class="page-no">${pageNumber}</span>
            </div>
          </div>
        `;
      }

      if (page.type === "cover") {
        return `
          <div class="page-content cover-layout">
            <div class="cover-emblem">${escapeHtml(page.icon || "📖")}</div>
            <div class="cover-badge">${escapeHtml(page.badge || "BOOK")}</div>
            <h1 class="cover-title">${escapeHtml(page.title || "")}</h1>
            <p class="cover-sub">${escapeHtml(page.subtitle || "")}</p>
          </div>
        `;
      }

      return `
        <div class="page-content">
          <div class="chapter-kicker">${escapeHtml(page.kicker || "Nội dung")}</div>
          <h3 class="chapter-title">${escapeHtml(page.title || "")}</h3>
          ${page.lead ? `<p class="lead">${escapeHtml(page.lead)}</p>` : ""}
          ${(page.blocks || []).map(blockTemplate).join("")}

          <div class="page-footer">
            <span>Flipbook 3D</span>
            <span class="page-no">${pageNumber}</span>
          </div>
        </div>
      `;
    }

    function createStaticLeftPage(page, index) {
      const el = document.createElement("div");
      el.className = "page static-left";
      el.innerHTML = renderPageContent(page, index);
      return el;
    }

    function createSheet(frontPage, backPage, index) {
      const sheet = document.createElement("div");
      sheet.className = "sheet";
      sheet.dataset.index = index;
      sheet.style.zIndex = 100 - index;

      const front = document.createElement("div");
      front.className = "page front";
      front.innerHTML = renderPageContent(frontPage, index * 2 + 1);

      const back = document.createElement("div");
      back.className = "page back";
      back.innerHTML = renderPageContent(backPage, index * 2 + 2);

      sheet.appendChild(front);
      sheet.appendChild(back);
      return sheet;
    }

    function buildBook() {
      document.querySelectorAll(".sheet, .static-left").forEach(el => el.remove());

      const leftPage = createStaticLeftPage(DATA.pages[0], 0);
      book.appendChild(leftPage);

      for (let i = 0; i < totalSpreads - 1; i++) {
        const frontPage = DATA.pages[i * 2 + 1];
        const backPage = DATA.pages[i * 2 + 2];
        const sheet = createSheet(frontPage, backPage, i);
        book.appendChild(sheet);
      }

      updateBook();
    }

    function updateBook() {
      const sheets = [...document.querySelectorAll(".sheet")];

      sheets.forEach((sheet, i) => {
        if (i < currentSpread) {
          sheet.classList.add("flipped");
          sheet.style.zIndex = i + 1;
        } else {
          sheet.classList.remove("flipped");
          sheet.style.zIndex = 100 - i;
        }
      });

      const staticLeft = document.querySelector(".static-left");
      if (staticLeft) {
        staticLeft.style.visibility = currentSpread === 0 ? "visible" : "hidden";
      }

      const currentPage = Math.min(currentSpread * 2 + 1, totalPages);
      pageInfo.textContent = `Trang ${currentPage} / ${totalPages}`;

      const max = Math.max(totalPages - 1, 1);
      progressBar.style.width = `${((currentPage - 1) / max) * 100}%`;

      prevBtn.disabled = currentSpread === 0;
      nextBtn.disabled = currentSpread >= totalSpreads - 1;
    }

    function nextPage() {
      if (currentSpread < totalSpreads - 1) {
        currentSpread++;
        updateBook();
      }
    }

    function prevPage() {
      if (currentSpread > 0) {
        currentSpread--;
        updateBook();
      }
    }

    prevBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      prevPage();
    });

    nextBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      nextPage();
    });

    book.addEventListener("click", (e) => {
      const rect = book.getBoundingClientRect();
      const x = e.clientX - rect.left;

      if (x > rect.width * 0.55) nextPage();
      else if (x < rect.width * 0.45) prevPage();
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight") nextPage();
      if (e.key === "ArrowLeft") prevPage();
    });

    let touchStartX = 0;
    let touchStartY = 0;

    window.addEventListener("touchstart", (e) => {
      touchStartX = e.changedTouches[0].clientX;
      touchStartY = e.changedTouches[0].clientY;
    }, { passive: true });

    window.addEventListener("touchend", (e) => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;

      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
        if (dx < 0) nextPage();
        else prevPage();
      }
    }, { passive: true });

    renderNavbar();
    buildBook();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
