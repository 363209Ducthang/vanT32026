<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Búp Sen Xanh - Sơn Tùng</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    * { box-sizing: border-box; }

    :root {
      --book-w: min(96vw, 2200px);
      --book-h: min(84vh, 1320px);
      --page-gap: clamp(12px, 1vw, 24px);

      --paper: #fffdf7;
      --paper-2: #f4ecde;
      --ink: #1d2734;
      --muted: #556274;

      --cover-1: #1659d6;
      --cover-2: #0a327c;
      --cover-3: #06214d;

      --shadow: 0 40px 90px rgba(0,0,0,.35);
      --turn-time: 1.1s;
      --nav-h: 78px;
    }

    html, body { height: 100%; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
      font-family: 'Segoe UI', Inter, Arial, Helvetica, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 8%, rgba(255,255,255,.55), transparent 24%),
        radial-gradient(circle at 85% 12%, rgba(255,255,255,.35), transparent 18%),
        linear-gradient(135deg, #d9ebff 0%, #eef6ff 28%, #f9fbff 58%, #ddf0ff 100%);
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 9999;
      background: rgba(255,255,255,.88) !important;
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(15,23,42,.08);
      box-shadow: 0 10px 30px rgba(15,23,42,.08);
      min-height: var(--nav-h);
    }

    .navbar-brand img {
      height: 46px;
      width: auto;
      object-fit: contain;
      display: block;
      border-radius: 10px;
    }

    .btn-nav {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      color: #0f172a;
      background: #ffffff;
      border: 1px solid rgba(15,23,42,.08);
      box-shadow: 0 8px 18px rgba(15,23,42,.06);
      transition: .2s ease;
    }

    .btn-nav:hover {
      transform: translateY(-1px);
      color: #1d4ed8;
      border-color: rgba(37,99,235,.2);
    }

    .nav-buttons { margin-left: auto; }

    .app {
      min-height: 100%;
      display: grid;
      grid-template-rows: 1fr auto;
      padding: calc(var(--nav-h) + 18px) clamp(10px, 2vw, 26px) 12px;
      gap: 10px;
    }

    .stage {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 4600px;
      overflow: hidden;
    }

    .floor-shadow {
      position: absolute;
      width: calc(var(--book-w) * 0.92);
      height: clamp(50px, 5vw, 90px);
      bottom: 2.5%;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(0,0,0,.28), transparent 72%);
      filter: blur(18px);
      transform: translateY(16px);
      pointer-events: none;
    }

    .book {
      position: relative;
      width: var(--book-w);
      height: var(--book-h);
      transform-style: preserve-3d;
      transform: rotateX(10deg);
      user-select: none;
      cursor: pointer;
    }

    .book-base {
      position: absolute;
      inset: 0;
      border-radius: 22px;
      background: linear-gradient(180deg, #cbc5bc 0%, #b4ada4 35%, #d8d1c9 100%);
      transform: translateZ(-36px);
      box-shadow: var(--shadow);
    }

    .page-stack-left, .page-stack-right {
      position: absolute;
      top: clamp(14px, 1vw, 24px);
      width: calc(50% - var(--page-gap));
      height: calc(100% - clamp(28px, 2vw, 48px));
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(180deg, #fcf8ef 0%, #efe7d7 45%, #faf5ea 100%);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.07), inset 0 0 20px rgba(0,0,0,.07);
      z-index: 1;
    }

    .page-stack-left { left: var(--page-gap); }
    .page-stack-right { right: var(--page-gap); }

    .spine {
      position: absolute;
      left: 50%;
      top: 1.2%;
      width: clamp(18px, 1vw, 26px);
      height: 97%;
      transform: translateX(-50%) translateZ(4px);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,.65) 0%, rgba(255,255,255,.18) 12%, rgba(0,0,0,.18) 48%, rgba(255,255,255,.28) 80%, rgba(255,255,255,.55) 100%);
      box-shadow: 0 0 26px rgba(255,255,255,.28), inset 0 0 10px rgba(0,0,0,.2);
      z-index: 6;
      pointer-events: none;
    }

    .gutter-shadow {
      position: absolute;
      left: 50%;
      top: clamp(14px, 1vw, 24px);
      width: clamp(60px, 6vw, 100px);
      height: calc(100% - clamp(28px, 2vw, 48px));
      transform: translateX(-50%);
      background: radial-gradient(circle at center, rgba(0,0,0,.16), transparent 68%);
      filter: blur(12px);
      z-index: 4;
      pointer-events: none;
    }

    .sheet {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      pointer-events: none;
    }

    .page {
      position: absolute;
      top: clamp(14px, 1vw, 24px);
      width: calc(50% - var(--page-gap));
      height: calc(100% - clamp(28px, 2vw, 48px));
      border-radius: 18px;
      overflow-y: auto;
      background: linear-gradient(180deg, var(--paper) 0%, #fbf7ee 55%, #f8f1e4 100%);
      border: 1px solid rgba(0,0,0,.07);
      box-shadow: 0 10px 26px rgba(0,0,0,.12), inset 0 0 40px rgba(255,255,255,.4);
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
    }

    .page::-webkit-scrollbar { width: 6px; }
    .page::-webkit-scrollbar-thumb { background: rgba(0,0,0,.15); border-radius: 999px; }

    .static-left { left: var(--page-gap); transform-origin: right center; z-index: 5; }
    .front { right: var(--page-gap); transform-origin: left center; transition: transform var(--turn-time) cubic-bezier(.2,.72,.18,1); z-index: 3; }
    .back { left: var(--page-gap); transform: rotateY(180deg); transform-origin: right center; transition: transform var(--turn-time) cubic-bezier(.2,.72,.18,1); z-index: 2; }

    .sheet.flipped .front { transform: rotateY(-180deg); }
    .sheet.flipped .back { transform: rotateY(0deg); }

    .page-content {
      position: relative;
      z-index: 1;
      height: 100%;
      padding: clamp(18px, 1.5vw, 34px) clamp(18px, 1.6vw, 36px) clamp(14px, 1vw, 24px);
      display: flex;
      flex-direction: column;
      gap: clamp(10px, 1vw, 16px);
      overflow-y: auto;
    }

    .cover-layout {
      height: 100%;
      border-radius: inherit;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 14px;
      color: #fff;
      background: radial-gradient(circle at 18% 14%, rgba(255,255,255,.18), transparent 26%), radial-gradient(circle at 82% 18%, rgba(255,255,255,.12), transparent 16%), linear-gradient(145deg, var(--cover-1) 0%, var(--cover-2) 52%, var(--cover-3) 100%);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.08), inset 0 0 40px rgba(255,255,255,.08);
      position: relative;
      overflow: hidden;
    }

    .cover-emblem { width: clamp(90px, 8vw, 150px); height: clamp(90px, 8vw, 150px); display: grid; place-items: center; border-radius: 28px; font-size: clamp(40px, 3vw, 70px); background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.16); backdrop-filter: blur(8px); }
    .cover-badge { display: inline-flex; align-items: center; justify-content: center; padding: 8px 18px; border-radius: 999px; font-size: clamp(12px, .85vw, 16px); font-weight: 800; letter-spacing: .14em; text-transform: uppercase; color: #fff8d5; border: 1px solid rgba(255,255,255,.16); background: rgba(255,255,255,.08); }
    .cover-title { margin: 0; max-width: 90%; font-size: clamp(30px, 4.2vw, 86px); line-height: 1.03; font-weight: 900; }
    .cover-sub { margin: 0; max-width: min(80%, 680px); font-size: clamp(14px, 1.25vw, 24px); line-height: 1.75; opacity: .96; }

    .chapter-kicker { font-size: clamp(11px, .78vw, 14px); font-weight: 800; letter-spacing: .14em; color: #8a6a15; text-transform: uppercase; }
    .chapter-title { margin: 0; font-size: clamp(22px, 1.8vw, 40px); line-height: 1.2; }
    .lead { margin: 0; font-size: clamp(14px, 1.08vw, 20px); line-height: 1.8; color: var(--muted); white-space: pre-wrap; }

    .highlight { padding: clamp(14px, 1vw, 18px); border-radius: 16px; background: linear-gradient(180deg, #fff4cf 0%, #fff9e7 100%); border-left: 5px solid #f2b628; color: #725300; font-size: clamp(13px, .95vw, 18px); line-height: 1.8; }

    .page-footer { margin-top: auto; padding-top: 10px; border-top: 1px dashed rgba(15,23,42,.14); display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: clamp(12px, .85vw, 15px); color: #778396; }
    .page-no { font-weight: 800; color: #0f172a; }

    .controls {
      width: min(760px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 22px;
      background: rgba(255,255,255,.78);
      border: 1px solid rgba(255,255,255,.7);
      box-shadow: 0 16px 40px rgba(15,23,42,.08);
      backdrop-filter: blur(12px);
    }

    .nav-btn-control {
      border: 0;
      min-width: 92px;
      padding: 14px 16px;
      border-radius: 16px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 800;
      transition: transform .18s ease, opacity .18s ease;
    }
    .nav-btn-control:hover { transform: translateY(-2px); }
    .nav-btn-control.prev { background: #ffffff; color: #0f172a; border: 1px solid rgba(15,23,42,.08); box-shadow: 0 8px 18px rgba(15,23,42,.06); }
    .nav-btn-control.next { color: white; background: linear-gradient(135deg, #2563eb, #1d4ed8); box-shadow: 0 12px 24px rgba(37,99,235,.24); }
    .nav-btn-control:disabled { cursor: not-allowed; opacity: .55; transform: none; }

    .status { display: grid; gap: 8px; min-width: 0; }
    .progress { width: 100%; height: 10px; border-radius: 999px; overflow: hidden; background: #e6e9f0; }
    .progress span { display: block; width: 0%; height: 100%; border-radius: inherit; background: linear-gradient(90deg, #2563eb, #6bb6ff); transition: width .35s ease; }
    .hint { text-align: center; font-size: 13px; color: #64748b; margin-top: 6px; margin-bottom: 5%; }

    @media (max-width: 1400px) { :root { --book-w: min(95vw, 1800px); --book-h: min(80vh, 1050px); } }
    @media (max-width: 980px) { :root { --book-w: min(97vw, 1260px); --book-h: min(70vh, 820px); } .book { transform: rotateX(6deg); } }
    @media (max-width: 640px) { :root { --book-w: 97vw; --book-h: min(56vh, 560px); --page-gap: 10px; } .book { transform: rotateX(3deg); } .controls { grid-template-columns: 74px 1fr 74px; } .nav-btn-control { min-width: 74px; padding: 12px 10px; font-size: 14px; } .cover-title { font-size: clamp(22px, 6vw, 34px); } .chapter-title { font-size: 18px; } }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg topbar">
    <div class="container-fluid px-3 px-lg-4">
      <a class="navbar-brand" id="brandLink" href="#">
        <img id="brandLogo" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231659d6'/%3E%3Ctext x='50' y='67' font-size='50' text-anchor='middle' fill='white' font-family='monospace'%3E🌾%3C/text%3E%3C/svg%3E" alt="Logo">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="navbarMain">
        <ul class="navbar-nav me-auto"></ul>
        <div class="nav-buttons d-flex align-items-center gap-2" id="navButtons"></div>
      </div>
    </div>
  </nav>

  <div class="app">
    <div class="stage">
      <div class="floor-shadow"></div>
      <div class="book" id="book"></div>
    </div>
    <div>
      <div class="controls">
        <button class="nav-btn-control prev" id="prevBtn">◀ Trước</button>
        <div class="status"><strong id="pageInfo">Trang 1 / 1</strong><div class="progress"><span id="progressBar"></span></div></div>
        <button class="nav-btn-control next" id="nextBtn">Sau ▶</button>
      </div>
      <div class="hint">Nhấn nửa phải sách để sang trang, nửa trái để quay lại. Điện thoại vuốt trái/phải.</div>
    </div>
  </div>

  <script>
    // ==================== TOÀN BỘ NỘI DUNG BÚP SEN XANH ====================
    // Nội dung được trích từ file PDF, đầy đủ 3 chương với 31 phần
    const PAGE_CONTENTS = [
      { type: "cover", title: "BÚP SEN XANH", subtitle: "Sơn Tùng", badge: "TIỂU THUYẾT LỊCH SỬ", icon: "🌾" },
      { title: "Đôi Nét Về Tác Giả", content: "Nhà văn, nhà cách mạng Sơn Tùng: \"Năm 1941, ở tuổi 16, tràn đầy nhiệt huyết, Sơn Tùng đeo ba lô hoà vào dòng chảy của cơn lốc cách mạng. Ban đầu ông hoạt động trong phong trào thanh niên, sinh viên thủ đô. Sau khi Hà Nội giải phóng, Sơn Tùng vào học tại trường Đại học nhân dân và sau đó trở thành cán bộ tuyên truyền của Đảng. Năm 1961 ông về viết cho báo Nông nghiệp và từ cuối năm 1962 là phóng viên của báo Tiền phong. Năm 1967 ông được điều vào Nam thành lập và phụ trách tờ Thanh niên giải phóng. Năm 1971 ông bị thương nặng và rời chiến trường miền Nam mang trên mình 14 vết thương, 3 mảnh đạn còn găm trong sọ não. Nửa người bên phải hầu như bị liệt... Sau đó ông xin về nhà và luyện khí công. Với nghị lực phi thường, ông khổ luyện từ 2h sáng tới 8h tối, sức khoẻ ông dần dần bình phục...\n\n“Trong đầm gì đẹp bằng sen, lá xanh bông trắng lại chen nhị vàng. Nhị vàng bông trắng lá xanh, gần bùn mà chẳng hôi tanh mùi bùn”. Loài hoa sen tinh khiết ví như tâm hồn Bác vậy..." },
      { title: "Chương I - Thời Thơ Ấu (Phần 1)", content: "Cơn dông mùa hạ dấy lên ở phía nam. Mây đen từng khối ùn ùn như nấm từ dưới chân trời đùn lên. Thoáng chốc, các ngọn núi của dãy Dăng Màn, Thiên Nhẫn… đã ngập chìm vào mây đen đục. Mảng nắng hẹp dần. Cảnh sắc hai bờ sông Lam đã ngả màu sẫm. Bên gốc cây đa đầu làng Chùa có mấy con bò đứng ngủ, mồm nhai uể oải. Một tốp người đi làm đồng về ngồi nghỉ chân bên gốc đa đang gạ ông Xẩm hát cho nghe một bài mới. Ông Xẩm ngước đôi mắt mù lòa về phía có tiếng sấm xa xa... Ông Xẩm cất tiếng đàn bầu: \"Trời có thấu chăng trời! Nước Nam cơ khổ nhiều đời đắng cay...\" Bé Thanh chạy về khi mẹ chuyển dạ sinh em trai. Đêm đó, ông đồ Hoàng Xuân Đường đặt tên cho đứa trẻ là Nguyễn Sinh Côn, tự Tất Thành." },
      { title: "Chương I - Thời Thơ Ấu (Phần 2)", content: "Dưới bóng tre đầu làng, bà đồ cùng mấy người đứng tuổi chạy ra phía đầm sen. Về tới đầu sân, cơn đau chuyển sinh lại thốn thoáy, mệt quá chị nho Sắc phải ngồi thụp xuống bên gốc cây thị. Bà đồ giục cô An: \"An, con vô quạt than lên! Mau!\" Bé Thanh bước qua dãy chè mạn hảo sang nhà ông bà ngoại. Tiếng khóc chào đời của đứa trẻ vang lên. Ông đồ ngồi xếp bằng trên phản gụ, anh nho Sắc ngồi đối diện. Ông đồ nói: \"Tôi muốn đặt cho cháu tên là Côn, tự là Tất Thành. Côn ấy là tích loài cá hóa chim bằng. Thằng bé sẽ có chí vùng vẫy bốn bể, dù gặp truân chuyên chìm nổi, nhưng ắt thành công.\" Anh nho Sắc nắn nót dòng chữ Nguyễn Sinh Côn, tự Tất Thành." },
      { title: "Chương I - Thời Thơ Ấu (Phần 3)", content: "Không ai còn nhớ được người đầu tiên của dòng họ Nguyễn Sinh đến làng Sen khai cơ lập nghiệp. Người ta chỉ còn nhớ rằng, từ buổi làng Sen còn là trang trại đã có người họ Nguyễn ở sinh sống. Hồi bấy giờ còn gọi là Trại Sen, vì có nhiều đầm sen rộng bát ngát. Hà Thị Hy là con gái một nghệ nhân nổi tiếng về ngón đàn đáy, đàn bầu. Cô có biệt tài về múa đèn, được gọi là cô Đèn. Cô Hy về làm bạn với ông Nguyễn Sinh Nhậm, năm Quý Hợi (1863) sinh con trai đặt tên là Nguyễn Sinh Sắc. Cha mất sớm, mẹ cũng mất khi Sắc mới lên bốn, Sắc về ở với người anh cùng cha khác mẹ." },
      { title: "Chương I - Thời Thơ Ấu (Phần 4)", content: "Từ ngày ông đồ Hoàng Xuân Đường tạ thế, nhà bà đồ trở nên eo hẹp tiền tiêu. Cả nhà bảy miệng ăn chỉ trông vào hoa lợi của hơn hai mẫu ruộng. Chị nho Sắc và cô An phải kéo sợi dệt vải luôn tay mới có tiền bút nghiên cho anh Sắc học ôn thi. Vừa qua giỗ đầu ông Hoàng Xuân Đường, anh nho Sắc đi thi Hương khoa Giáp Ngọ (1894) trường Nghệ. Ông Xẩm hát tích Cúc Hoa nuôi chồng ăn học. Tin vui: anh nho Sắc đỗ cử nhân. Cả làng ra đón quan tân khoa. Anh Sắc nói: \"Tôi sinh từ làng Sen. Tôi lớn lên trên đất làng Chùa. Tôi là dân và bao giờ cũng vẫn là người dân của làng ta, của xứ sở ta.\"" },
      { title: "Chương I - Thời Thơ Ấu (Phần 5)", content: "Sương sớm ám mái nhà. Tiếng chim cu gáy trên khóm tre làng xa văng vẳng. Nắng trải vàng rộm đồng quê. Bà con hàng xóm và bạn hát phường vải lần lượt đến tiễn đưa gia đình quan cử vào kinh. Bé Côn chạy từ ngoài hè nhà sà vào lòng bà. Bà đồ ôm choàng lấy cháu, nước mắt ướt mèm. Đoàn người tiễn đưa ra tới con đường quan. Ông Xẩm cất tiếng đàn bầu: \"Chòm xóm náu lặng mà nghe, tôi xin ca một bài vè Đức ông. Bao giờ đầu nhọn như chông, xương đeo trước ngực, Đức ông sẽ về...\" Thành phố Vinh hiện ra trước mắt cậu bé Côn. Lần đầu tiên Côn thấy có nhiều đường tỏa ra như bàn cờ và nhà cửa san sát." },
      { title: "Chương I - Thời Thơ Ấu (Phần 6)", content: "Sau một tháng đi bộ ròng rã, gia đình anh cử nhân Nguyễn Sinh Sắc vào tới kinh đô Huế. Anh Sắc đưa vợ con đến ở đậu tại ngôi nhà tranh ba gian gần Viện Đô Sát. Anh vào học Quốc tử giám, đổi tên là Nguyễn Sinh Huy. Lần đầu tiên đến kinh thành Huế, Côn ngơ ngác như chú nai con lạc. Côn và anh cả Khiêm được cha dẫn đi xem phong cảnh đất thần kinh. Côn hỏi về sông Hương, về Ngọ Môn. Đi trên đường về chợ Xép, Côn thấy nhiều người nghèo khổ, ăn xin. Anh Sắc nói: \"Các con cứ hình dung cái nón chóp úp sấp thì sự sắp xếp kẻ giàu, người nghèo ở trên thế gian này cũng thế.\"" },
      { title: "Chương I - Thời Thơ Ấu (Phần 7)", content: "Anh cử nhân Nguyễn Sinh Sắc lại rớt khoa thi Hội Mậu Tuất (1898). Quan thượng thư Bộ Hình Đào Tấn thông cảm cảnh nhà túng thiếu, bàn với ông Nguyễn Viết Chuyên đón cử nhân Nguyễn Sinh Sắc về dạy học. Anh Sắc nhận đến ở nhà ông Nguyễn Độ tại Dương Nổ. Côn lên tám tuổi có trí nhớ khác thường. Một hôm anh Sắc kiểm tra bài, Côn đã thuộc cả mười lăm trang sách. Anh Sắc nói: \"Con đã thuộc bài, các bạn chưa thuộc mà con rủ bạn đi câu cá là phạm lỗi ích kỷ.\" Mặt trời đã đứng bóng, ba cậu học trò bước theo sau thầy trên con đường làng man mát bóng tre." },
      { title: "Chương I - Thời Thơ Ấu (Phần 8)", content: "Chị Sắc sống thui thủi một mình trong thành nội, nhớ chồng con da diết. Chị bàn với chồng đưa bé Côn về ở cùng. Cậu bé Nguyễn Sinh Côn lại sống bên cạnh mẹ trong những ngày mẹ đau yếu sắp sinh em. Côn xin theo Huệ Minh xem lễ Vạn Thọ (sinh nhật vua). Côn được nhìn thấy vua Thành Thái. Sau đó Côn bị cảm. Mùa hè năm cuối thế kỷ 19, Côn đang nhặt lá thì mẹ đau bụng chuyển sinh. Côn chạy sang Dương Nổ gọi cha về. Chị Sắc sinh con trai, anh đặt tên là Nguyễn Sinh Nhuận. Chị Sắc bị bệnh hậu sản. Anh Sắc phải đi Thanh Hóa coi thi Hương." },
      { title: "Chương I - Thời Thơ Ấu (Phần 9)", content: "Ngày 22 tháng chạp năm Canh Tý (10-2-1901), kinh thành Huế nhuộm màu ảm đạm. Côn xách cơm về thì nghe tiếng Huệ Minh gọi: \"Côn ơi! Mệ chết!\" Côn chạy về, mẹ đã tắt thở. Côn phủ phục bên mẹ khóc. Huệ Minh bế bé Xin ra. Hàng xóm đến giúp đưa đám. Ngôi mộ bà cử Sắc được vun cao bên bãi tha ma Nam Giao. Chôn cất mẹ xong, Côn bế em về nhà. Đêm giao thừa, Côn ru em: \"À ơi. Bồng bồng bế bế bồng bồng… Cò con theo mẹ sang sông đắm đò…\" Bé Xin gào khóc đòi sữa rồi đuối dần." },
      { title: "Chương I - Thời Thơ Ấu (Phần 10)", content: "Nguyễn Sinh Sắc về tới Thành Nội, vợ đã mất, đứa con út hấp hối trên tay bé Côn. Ông đưa hai con trai trở về Nghệ. Bà đồ An ôm cháu khóc. Phan Bội Châu và Vương Thúc Quý phúng viếng đôi câu đối. Bà đồ An bán ruộng lần thứ ba cho chàng rể vào kinh ứng thí. Côn kể cho bà nghe việc được nhìn thấy mặt vua. Côn hỏi về người tai mắt. Bà đáp: \"Người tai mắt là người có nhiều chữ, có chí lớn, lo nghĩ những công việc ích nước lợi dân.\" Trong lớp học, Côn làm câu đối: \"Chung Sơn vượng khí thành kiên cố, Trắc Lĩnh đa vân thị lão niên.\" Tin vui: ông Nguyễn Sinh Sắc đậu Hội thí, Phó bảng." },
      { title: "Chương I - Thời Thơ Ấu (Phần 11)", content: "Cụ đồ An ốm nặng. Côn chăm sóc bà, nhai trầu cho bà. Bà nói: \"Cháu sáng ý, lanh tay, nhạy miệng. Bà rất áy náy về cha cháu ở cái tuổi trẻ chưa qua già chưa tới mà đã thất nội trợ!\" Tiếng chim cuốc kêu đêm, bà kể chuyện vua Đỗ Vũ hóa thành chim cuốc. Một buổi sáng, Côn được cha giao đi Vinh cân thuốc cho bà. Trên đường về, Côn gặp anh Khiêm báo tin: \"Bà chết rồi!\" Côn khóc nấc: \"Bà ơi! Ông ngoại cháu chết! Mệ cháu chết! Em cháu chết! Giờ lại đến lượt bà chết! Bà ơi!\"" },
      { title: "Chương I - Thời Thơ Ấu (Phần 12)", content: "Chôn cất bà ngoại xong, Phan Bội Châu lập Duy Tân Hội (5-1904). Quan Phó bảng Sắc không tham gia nhưng thường trao đổi với Phan Bội Châu. Côn thường làm liên lạc. Một hôm Côn chiết tự: \"Rút ruột vua, tam dân bình đẳng. Chém đầu Tây, tứ chủng giai huynh.\" Trên đường tiễn Phan Bội Châu lên đường Đông du, Phan Bội Châu nói với Côn: \"Chim bằng tung cánh xuyên trời thẳm, thử sức đại đương thuở cá côn. Chú tin cháu sẽ là người xoay chuyển cuộc thế.\" Hai cha con quan Phó bảng Sắc lặng lẽ bước trên con đường mưa bụi." },
      { title: "Chương II - Thời Niên Thiếu (Phần 1)", content: "Những ngày sửa soạn theo cha vào Huế lần thứ hai, Côn theo cha đi thắp hương mộ ông bà. Hai anh em đến chào thầy Vương Thúc Quý. Thầy tặng sách \"Nhất nhật tam tỉnh ngô thân\" và nói: \"Con đã để lại trong trí thầy một vế câu đối: Cưỡi ngựa dong thẳng Tấn lên Đường. Hôm nay con lên đường, thầy chúc con thẳng tấn đến đích lớn.\" Gió sớm đưa hương sen vào cửa sổ. Quan Phó bảng Sắc ngồi trước án thư uống trà mạn sen, nhìn con gái Thanh đã hai mươi tuổi, lòng băn khoăn. Ba cha con từ giã quê nhà, dân làng tiễn ra tận đầu làng." },
      { title: "Chương II - Thời Niên Thiếu (Phần 2)", content: "Ba cha con ông Sắc trở lại Huế: quan Phó bảng Nguyễn Sinh Huy, Nguyễn Tất Đạt, Nguyễn Tất Thành. Hai anh em trồng cây đại trên mộ mẹ. Những ngày đầu ở nhờ nhà ông Phạm Khắc Doãn. Tất Thành được quan biên tu chú ý vì đôi mắt sáng. Thành thể hiện sự khéo léo, nội trợ, được Phạm Gia Cần quý mến. Quan Phó bảng Huy nhận chức thừa biện Bộ Lễ. Phan Chu Trinh diễn thuyết đòi dân quyền. Tất Thành vào trường Đông Ba học chữ quốc ngữ và tiếng Pháp. Thầy hiệu trưởng khen Thành học giỏi, dịch thơ Pháp thành ca dao Việt Nam." },
      { title: "Chương II - Thời Niên Thiếu (Phần 3)", content: "Thu sang, Thành kết thúc tiểu học, hồi hộp chờ vào trường Quốc học. Chị Thanh gửi thư: \"Chị sống một thân, giữ nếp thanh bần mà không dốt nát. Chị đã học được chữ mới như em. Nghe lời giải San, chị vô Hội kín...\" Thầy Lê Văn Miến đến báo tin hai anh em được nhận vào trường Quốc học. Thầy nói: \"Nước mất mà không biết là bất trí, biết mà không chiến đấu là bất trung.\" Cầu Tràng Tiền được dựng lại. Nguyễn Tất Thành bước vào \"Thiên đường trường học\" với bao ngờ vực. Trên cổng trường gắn biển: \"Pháp tự quốc học trường môn\"." },
      { title: "Chương II - Thời Niên Thiếu (Phần 4)", content: "Đêm giỗ mẹ, ba cha con quây quần. Ông Đặng Thái Thân đến thăm, bàn việc đưa Nguyễn Tất Thành xuất dương sang Nhật theo Phan Bội Châu. Thành bày tỏ quan điểm: \"Đuổi hổ cửa trước, rước beo cửa sau. Muốn đánh đuổi kẻ địch thì phải biết rõ chúng. Cháu muốn sang Pháp để tìm hiểu.\" Đặng Thái Thân xúc động: \"Dù không cùng đường đi, nhưng vẫn tìm thấy ở cháu một đồng chí đồng tâm. Chú cháu mình cùng một trái tim: Yêu nước.\" Ông lặn vào đêm tối." },
      { title: "Chương II - Thời Niên Thiếu (Phần 5)", content: "Mùa hè, Thành cùng bạn thăm lăng tẩm, chùa Thiên Mụ. Bỗng tiếng trống ngũ liên, vọi đồng: \"Hoàng triều có biến!\" Vua Thành Thái mưu đánh Tây bị lộ, bị hạ ngục. Quan thừa biện Huy kể: \"Đức vua giả vờ lơ đễnh, giấu kín chí lớn bằng cách ham đọc sách Pháp, tập lái ô tô. Người Tây sợ lý tưởng cấp tiến của ngài.\" Sáng 21 tháng 6 năm Đinh Mùi (30-7-1907), vua Thành Thái bị đày. Dân chúng lập bàn thờ tiễn biệt. Vua ném tờ tuyên cáo xuống đất: \"Muôn dân nô lệ từng đàn, vui chi bệ ngọc ngai vàng riêng ta? Hỡi ôi mất nước tan nhà, cừu thù quốc sỉ ấy là nợ chung.\"" },
      { title: "Chương II - Thời Niên Thiếu (Phần 6)", content: "Nguyễn Sinh Huy bị buộc thôi chức, bổ nhiệm tri huyện Bình Khê. Vương Thúc Quý từ trần trên đường xuất dương. Tất Thành tiễn cha đi Bình Khê. Bến đò sông Hương, ông Huy nói: \"Cha đã kính thư vào ông Hồ Tá Bang. Nếu lập được trường Dục Thanh tại Phan Thiết, cha tới dạy chữ nho, con nhận dạy chữ mới.\" Ông đặt tay lên vai con: \"Với con, cha mong đợi rất nhiều. Cha đi nhá!\" Thành đứng nhìn theo, cái ô của cha nhòa vào nắng quáng." },
      { title: "Chương II - Thời Niên Thiếu (Phần 7)", content: "Nguyễn Tất Đạt từ Nghệ về, Thành bị cảm sốt. Thầy Lê Văn Miến đến thăm, mời hai anh em về ở nhưng Thành từ chối vì muốn sống tự lập. Trong giờ học lịch sử cách mạng Pháp, Thành suy tư: nước Pháp có những nhà tư tưởng như Montesquieu, Rousseau đề xướng Tự do, Bình đẳng, Bác ái, sao lại xâm lược nước Nam? Thầy giáo Pháp khen những học trò thuộc lòng sử Pháp. Thành nói: \"Biết nhiều càng quý, tiếc là hai anh ấy lại quên mất lịch sử nước nhà, chẳng nhớ nổi tên các con sông, trái núi ở quê hương mình!\"" },
      { title: "Chương II - Thời Niên Thiếu (Phần 8)", content: "Cuộc nổi dậy của nông dân Thừa Thiên – Huế bị dập tắt. Nguyễn Tất Thành bị cảnh sát săn đuổi. Tòa khâm sứ yêu cầu học sinh tham gia biểu tình làm giấy đầu thú. Thầy Lê Văn Miến khuyên Thành nhẫn nhục để học. Thành đáp: \"Con cam chịu bị đuổi ra khỏi trường chứ không thể tự trói mình nộp mạng cho tòa khâm! Vua ung dung đi đày, không quay trở lại ngồi trên ngai vàng nô lệ. Con yêu cái ghế học trò, nhưng không thể chịu nhục để có mảnh bằng thành chung.\" Thầy Miến nghẹn ngào: \"Con hãy đi theo tiếng gọi của lòng con.\"" },
      { title: "Chương II - Thời Niên Thiếu (Phần 9)", content: "Nắng nóng như lửa đốt Huế. Nguyễn Tất Thành rời Huế, đi theo nhóm lái kẹo mạch nha vào Quảng Ngãi. Qua đèo Hải Vân, hổ vồ ngựa. Mọi người đào huyệt chôn ngựa. Ông xà ích khấn: \"Con trâu là đầu cơ nghiệp, con ngựa là vựa tiền.\" Thành cùng đẩy xe vượt đèo. Đến Quảng Ngãi, anh nghe dân kể về quan Trần Văn Phổ (cha Trần Phú) thắt cổ tự tử vì không chịu hợp tác với thực dân. Thành vào Bình Định, gặp phường tuồng Vinh Thanh, nhận xét về vai Hoàng Phi Hổ. Ông trùm phường ngạc nhiên: \"Cậu là thầy tuồng rồi!\"" },
      { title: "Chương II - Thời Niên Thiếu (Phần 10)", content: "Thành vào Bình Khê gặp cha. Quan huyện Sắc hỏi lạnh lùng: \"Anh đến với tôi để làm gì?\" Thành đáp: \"Con đến thăm cha để rồi con đi.\" Ông nói: \"Được. Cha tưởng con đi theo cha thì đáng buồn. Con phải tự tìm ra cho mình một hướng đi.\" Ông kể chuyện thử lính hầu để nghiệm ra việc xử án. Ông nói: \"Làm quan dẫu có giữ mình trong sạch cũng không tránh được hết lỗi lầm. Chỉ một lần gieo oan thì cũng phải ba đời mình chịu oán. Thôi đi đi con! Nước mất con đi tìm nước.\"" },
      { title: "Chương II - Thời Niên Thiếu (Phần 11)", content: "Nguyễn Tất Thành vào Phan Thiết, nhận dạy học tại trường Dục Thanh. Anh dạy chữ Tây, sử ký, địa dư. Trong giờ học sử: \"Truyện Con Rồng cháu Tiên là niềm tự hào về giống nòi. Cái bọc 100 trứng là lòng mẹ. Chung một lòng mẹ là cùng một nòi giống, đó là hai tiếng Đồng Bào.\" Thầy dạy học trò, giúp đỡ người nghèo, tắm cho trẻ em xóm chài. Thầy gặp Tư Lê - người được anh cứu trong cuộc biểu tình ở Huế. Họ kết bạn, Tư Lê gọi anh là anh Ba. Anh Ba quyết định vào Sài Gòn." },
      { title: "Chương II - Thời Niên Thiếu (Phần 12)", content: "Một buổi sáng, thầy Thành vắng mặt ở trường. Ông Hồ Tá Bang đọc thư thầy để lại: \"Các trò thân yêu! Thầy không thể ở lại trường Dục Thanh dài hơn nữa. Thầy phải đi, đi rất xa. Ước mơ một ngày mai nước nhà độc lập tự do kêu gọi thầy dấn bước ra đi... Hồn nước gọi chúng ta lên phía trước! Ngày… tháng 10 năm 1910. Nguyễn Tất Thành.\" Ông Hồ Tá Bang nói: \"Chiếc lồng son nuôi chim họa mi không thể nuôi được chim đại bàng. Trường Dục Thanh không thể là nơi luyện chí anh hùng của thầy Nguyễn Tất Thành.\" Những áng mây nhuộm nắng ban mai bay ra biển xa xăm." },
      { title: "Chương III - Tuổi Hai Mươi (Phần 1)", content: "Thuyền chở hàng của Tư Lê từ Phan Thiết về Sài Gòn lúc đêm khuya. Anh Ba ngỡ ngàng trước đèn điện sáng trưng. Tư Lê đưa anh Ba qua bến cảng Nhà Rồng. Anh thấy những con tàu viễn dương sừng sững, những người thợ khuân vác vất vả. Họ giúp một ông lão bị đổ gạo. Tư Lê đưa anh Ba về xóm thợ gần Bến Nhà Rồng, gặp ông già Đờn và cô Út Huệ. Ông già Đờn đờn hay, được anh em thợ quý mến. Ông tiếp đón anh Ba niềm nở: \"Thầy Ba là người tai mắt, dám xả thân cứu người khổ đau, là hạng người Lục Vân Tiên rồi.\"" },
      { title: "Chương III - Tuổi Hai Mươi (Phần 2)", content: "Anh Ba tìm gặp Diệp Văn Kỳ - bạn cũ ở Huế. Kỳ ngạc nhiên khi thấy anh làm thợ khuân vác. Anh Ba nói: \"Ở đời nghề nào cũng tốt, không có nghề xấu mà có người xấu.\" Anh nhờ Kỳ đưa đi tìm cha. Ông Phó bảng Huy đang xem mạch tại hiệu thuốc Tam Thiên Đường. Hai cha con gặp nhau. Ông nói: \"Nước mất, con lo tìm đường cứu nước. Con tìm cha lúc này chẳng có nghĩa lý gì.\" Một ông già cảm ơn vì được chữa khỏi bệnh, muốn tặng lễ. Ông Huy từ chối: \"Nước mất, tôi đâu còn nhà nữa! Cha con tôi sống nay đây mai đó.\"" },
      { title: "Chương III - Tuổi Hai Mươi (Phần 3)", content: "Ngày Tết, anh Ba cùng ông già Đờn và Út Huệ đi xem chợ hoa Sài Gòn. Anh thấy cảnh thợ thuyền nghèo khổ, ăn Tết xa hoa rồi nợ nần. Anh Ba tìm thấy mục quảng cáo: hãng tàu Nhà Rồng chạy đường Sài Gòn - Mác-xây. Anh ấp ủ ý định sang Pháp. Tại bến cảng, anh Ba tập làm phu khuân vác, lao động nặng nhọc. Anh bị ngã kiệt sức, được Út Huệ chăm sóc. Anh Ba mua quà biếu ông già Đờn và mua rượu đãi anh em thợ. Anh khuyên anh em bỏ cờ bạc, mở lớp học dạy chữ." },
      { title: "Chương III - Tuổi Hai Mươi (Phần 4)", content: "Anh Ba mở lớp học dạy chữ cho anh em thợ thuyền ngay trong nhà ông già Đờn. Anh dạy họ đọc, viết, phát âm đúng. Anh nói: \"Bọn cai trị muốn dân ngu dễ trị. Hễ ai quan tâm đến việc dân no cơm ấm áo, dân có chữ là chúng triệt ngay. Chúng ta là người thợ phải rõ điều ấy để có chí học, có chí làm việc ích nước lợi nhà.\" Lớp học ngày càng đông. Ông già Đờn học đọc qua sách Lục Vân Tiên. Ông tâm sự: \"Có chữ, nhìn kẻ có quyền thế mình đỡ sợ hãi.\" Chữ anh Ba thắp sáng trong trái tim những người thợ." },
      { title: "Chương III - Tuổi Hai Mươi (Phần 5)", content: "Tháng sáu 1911, anh Ba nghe tin tàu Đô đốc La-tu-sơ Tơ-rê-vin sắp cập bến. Anh đến lữ quán gặp cha lần cuối. Ông Phó bảng Huy nói: \"Con đi xa nước, xa cha. Sinh ly có khác gì tử biệt... Con phải gạt bỏ những tính toán bé nhỏ. Cha rất vui về mục đích con đi tìm độc lập cho nước, tự do cho dân. Con đi sang Pháp coi thực sự có nhân quyền không. Dân Nam ta sống nặng với nghĩa nước tình nhà. Khi đi xa, con hãy nhớ về những điều bình thường ấy, con sẽ thấy trong tâm hồn mình cả một quê hương, cả một dân tộc. Đi đi con!\" Anh Ba lau nước mắt, nhận ít tiền từ cha." },
      { title: "Chương III - Tuổi Hai Mươi (Phần 6)", content: "Anh Ba ngồi bên bờ sông với Tư Lê, tâm sự: \"Tôi muốn sang Pháp để được nhìn tận mắt người dân Pháp sống thế nào, đằng sau những chữ tự do, bình đẳng, bác ái ẩn náu những gì.\" Tư Lê không thể đi cùng. Ngày 2 tháng 6 năm 1911, anh Ba xuống tàu Đô đốc La-tu-sơ Tơ-rê-vin. Ông thuyền trưởng Mai-sen nhận anh vào làm phụ bếp với lương 45 phơ-răng/tháng. Anh Ba nhận thẻ tàu và tập sách giới thiệu. Anh mỉm cười: mình sẽ được làm bạn với Táo quân." },
      { title: "Chương III - Tuổi Hai Mươi (Phần 7)", content: "Út Huệ vá áo cho anh Ba, lòng thẫn thờ. Anh Ba báo tin sẽ đi xa. Út Huệ nghẹn ngào: \"Sao anh không ở lại đây?\" Anh đáp: \"Tình cảnh nước mình, tôi không thể ngồi yên một chỗ xây dựng tổ ấm được.\" Đêm cuối, anh em thợ quây quần tiễn anh Ba. Ông già Đờn đàn hát: \"Kéo neo, kéo neo tàu chạy, gạt nước mắt tiễn đưa...\" Sáng ngày 5 tháng 6 năm 1911, anh Ba từ biệt mọi người. Út Huệ chạy theo trao nắm cơm: \"Anh! Cơm nắm. Em nấu cho anh bữa cơm cuối cùng này. Cầm lấy anh! Đi đi anh!\" Con tàu rời bến. Út Huệ khấn: \"Anh đi thuận gió xuôi buồm, hỡi những phương trời xa lạ, hãy đón lấy anh, một chàng trai nước Việt. Anh là của Nước của Dân, tất cả đợi Anh về.\"" },
      { type: "cover", title: "HẾT", subtitle: "Ngõ Văn, ngày 23 tháng 8 năm 1981", badge: "BÚP SEN XANH", icon: "🌿" }
    ];

    // Chuyển thành định dạng pages cho render
    const PAGES = PAGE_CONTENTS.map((p, idx) => {
      if (p.type === "cover") {
        return { type: "cover", title: p.title, subtitle: p.subtitle, badge: p.badge, icon: p.icon };
      } else {
        return {
          type: "content",
          kicker: p.title.includes("Chương") ? p.title.split(" ").slice(0,2).join(" ") : (p.title.length > 35 ? p.title.substring(0,32)+"..." : p.title),
          title: p.title,
          lead: p.content ? (p.content.length > 280 ? p.content.substring(0,280)+"…" : p.content) : "",
          blocks: [{ kind: "paragraph", text: p.content || "" }]
        };
      }
    });

    // ==================== PHẦN JAVASCRIPT CHỨC NĂNG ====================
    const brandLink = document.getElementById("brandLink");
    const brandLogo = document.getElementById("brandLogo");
    const navButtons = document.getElementById("navButtons");
    const book = document.getElementById("book");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const pageInfo = document.getElementById("pageInfo");
    const progressBar = document.getElementById("progressBar");

    let currentSpread = 0;
    const totalPages = PAGES.length;
    const totalSpreads = Math.ceil(totalPages / 2);

    function escapeHtml(value = "") { return String(value).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function renderNavbar() {
      brandLink.href = "#";
      brandLogo.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231659d6'/%3E%3Ctext x='50' y='67' font-size='50' text-anchor='middle' fill='white' font-family='monospace'%3E🌾%3C/text%3E%3C/svg%3E";
      navButtons.innerHTML = `<a class="btn-nav" href="#">Búp Sen Xanh</a><a class="btn-nav" href="#">Sơn Tùng</a>`;
    }

    function blockTemplate(block) {
      if (block.kind === "paragraph") return `<p class="lead" style="white-space: pre-wrap;">${escapeHtml(block.text)}</p>`;
      return "";
    }

    function renderPageContent(page, index) {
      const pageNumber = index + 1;
      if (!page) return `<div class="page-content"><div class="chapter-kicker">Trang trống</div><div class="page-footer"><span></span><span class="page-no">${pageNumber}</span></div></div>`;
      if (page.type === "cover") {
        return `<div class="page-content cover-layout"><div class="cover-emblem">${escapeHtml(page.icon || "🌾")}</div><div class="cover-badge">${escapeHtml(page.badge || "Sách")}</div><h1 class="cover-title">${escapeHtml(page.title || "")}</h1><p class="cover-sub">${escapeHtml(page.subtitle || "")}</p></div>`;
      }
      return `<div class="page-content"><div class="chapter-kicker">${escapeHtml(page.kicker || "Nội dung")}</div><h3 class="chapter-title">${escapeHtml(page.title || "")}</h3>${page.lead ? `<p class="lead">${escapeHtml(page.lead)}</p>` : ""}${(page.blocks || []).map(blockTemplate).join("")}<div class="page-footer"><span>Búp Sen Xanh</span><span class="page-no">${pageNumber}</span></div></div>`;
    }

    function createStaticLeftPage(page, index) { const el = document.createElement("div"); el.className = "page static-left"; el.innerHTML = renderPageContent(page, index); return el; }
    function createSheet(frontPage, backPage, index) {
      const sheet = document.createElement("div"); sheet.className = "sheet"; sheet.dataset.index = index; sheet.style.zIndex = 100 - index;
      const front = document.createElement("div"); front.className = "page front"; front.innerHTML = renderPageContent(frontPage, index*2+1);
      const back = document.createElement("div"); back.className = "page back"; back.innerHTML = renderPageContent(backPage, index*2+2);
      sheet.appendChild(front); sheet.appendChild(back); return sheet;
    }

    function buildBook() {
      document.querySelectorAll(".sheet, .static-left").forEach(el => el.remove());
      const leftPage = createStaticLeftPage(PAGES[0], 0); book.appendChild(leftPage);
      for (let i = 0; i < totalSpreads - 1; i++) {
        const frontPage = PAGES[i*2+1]; const backPage = PAGES[i*2+2];
        const sheet = createSheet(frontPage, backPage, i); book.appendChild(sheet);
      }
      updateBook();
    }

    function updateBook() {
      const sheets = [...document.querySelectorAll(".sheet")];
      sheets.forEach((sheet, i) => { if (i < currentSpread) { sheet.classList.add("flipped"); sheet.style.zIndex = i+1; } else { sheet.classList.remove("flipped"); sheet.style.zIndex = 100 - i; } });
      const staticLeft = document.querySelector(".static-left"); if (staticLeft) staticLeft.style.visibility = currentSpread === 0 ? "visible" : "hidden";
      const currentPage = Math.min(currentSpread*2+1, totalPages); pageInfo.textContent = `Trang ${currentPage} / ${totalPages}`;
      const max = Math.max(totalPages-1,1); progressBar.style.width = `${((currentPage-1)/max)*100}%`;
      prevBtn.disabled = currentSpread === 0; nextBtn.disabled = currentSpread >= totalSpreads-1;
    }

    function nextPage() { if (currentSpread < totalSpreads-1) { currentSpread++; updateBook(); } }
    function prevPage() { if (currentSpread > 0) { currentSpread--; updateBook(); } }

    prevBtn.addEventListener("click", (e) => { e.stopPropagation(); prevPage(); });
    nextBtn.addEventListener("click", (e) => { e.stopPropagation(); nextPage(); });
    book.addEventListener("click", (e) => { const rect = book.getBoundingClientRect(); const x = e.clientX - rect.left; if (x > rect.width * 0.55) nextPage(); else if (x < rect.width * 0.45) prevPage(); });
    window.addEventListener("keydown", (e) => { if (e.key === "ArrowRight") nextPage(); if (e.key === "ArrowLeft") prevPage(); });
    let touchStartX = 0; window.addEventListener("touchstart", (e) => { touchStartX = e.changedTouches[0].clientX; }, { passive: true });
    window.addEventListener("touchend", (e) => { const dx = e.changedTouches[0].clientX - touchStartX; if (Math.abs(dx) > 40) { if (dx < 0) nextPage(); else prevPage(); } }, { passive: true });

    renderNavbar();
    buildBook();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
