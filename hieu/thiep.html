<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="./main.css">
    <!-- GOOGLE FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Protest+Riot&family=Rubik+Glitch+Pop&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Protest+Revolution&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Pacifico&family=Protest+Revolution&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Valentine Day</title>
</head>
<body>
    <div class="container">
        <!-- Floating Hearts -->
        <img class="paperHeart paperHeart1" style="--time: 0s" src="./img/paperHeart.png" alt="Trái tim">
        <img class="paperHeart paperHeart2" style="--time: 1s" src="./img/paperHeart.png" alt="Trái tim">
        <img class="paperHeart paperHeart3" style="--time: 2.5s" src="./img/paperHeart.png" alt="Trái tim">
        <img class="paperHeart paperHeart4" style="--time: 4s" src="./img/paperHeart.png" alt="Trái tim">
        <img class="paperHeart paperHeart5" style="--time: 2s" src="./img/paperHeart.png" alt="Trái tim">
        <img class="paperHeart paperHeart6" style="--time: 3s" src="./img/paperHeart.png" alt="Trái tim">

        

        <!-- Main Title -->
        <div class="boxTitle">
            <span class="firstTitle partTitle">Journal Of Biology</span>
            <span class="secondTitle partTitle">Induction In Plants</span>
        </div>

        <!-- Cute Button -->
        <div class="btnContainer">
            <button class="openBtn">
                <!-- Heart decorations -->
                <span class="heart-decoration heart-1">❤️</span>
                <span class="heart-decoration heart-2">❤️</span>
                <span class="heart-decoration heart-3">❤️</span>
                <span class="heart-decoration heart-4">❤️</span>
                
                <!-- Button content -->
                <i class="fas fa-heart"></i>
                <span class="button-text">Mở thiệp nè</span>
            </button>
        </div>

        <!-- Valentine Card -->
        <div class="cardValentine">
            <!-- Close Button -->
            <button class="close-card-btn">
                <i class="fas fa-times"></i>
            </button>
            
            <div class="card-inner">
                <!-- Left Side (Front of Card) -->
                <div class="left">
                    <div class="heart-icon-container">
                        <i class="fas fa-heart"></i>
                    </div>
                    <div class="card-title-front">
                        <h1>From: Nhóm 2</h1>
                        <h2></h2>
                    </div>
                    <p class="tap-instruction">
                        <i class="fas fa-hand-point-up"></i> Chạm để mở thiệp
                    </p>
                </div>

                <!-- Right Side (Letter Content) -->
                <div class="right">
                    <div class="rightContent">
                        <div class="letter-header">
                            <h3><i class="fas fa-envelope"></i></h3>
                            <div class="heart-divider">
                                <i class="fas fa-heart"></i>
                                <i class="fas fa-heart"></i>
                                <i class="fas fa-heart"></i>
                            </div>
                        </div>
                        <div class="letterContent"></div>
                        <div class="letter-footer">
                            <div class="signature">Yêu lắm cô ơi ❤️</div>
                            <div class="valentine-date">1 tháng 4, 2026</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./main.js"></script>
</body>

</html>
